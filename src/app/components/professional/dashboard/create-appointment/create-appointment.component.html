<form [formGroup]="appointmentForm" (ngSubmit)="onSubmit()" class="space-y-6">
    <div class="w-full">
        <div role="tablist" class="grid w-full grid-cols-2 rounded-md bg-gray-100 text-gray-600">
            <button type="button" role="tab" [attr.aria-selected]="isExistingCustomer" (click)="selectTab(true)"
                class="flex items-center justify-center gap-2 px-3 py-1.5 text-sm font-medium"
                [ngClass]="{ 'bg-white text-black shadow': isExistingCustomer }">
                <svg class="h-4 w-4"></svg>
                Existing Customer
            </button>
            <button type="button" role="tab" [attr.aria-selected]="!isExistingCustomer" (click)="selectTab(false)"
                class="flex items-center justify-center gap-2 px-3 py-1.5 text-sm font-medium"
                [ngClass]="{ 'bg-white text-black shadow': !isExistingCustomer }">
                <svg class="h-4 w-4"></svg>
                New Customer
            </button>
        </div>

        <!-- Existing Customer Panel -->
        <div *ngIf="isExistingCustomer" class="mt-4 space-y-2">
            <label for="customer-search" class="text-sm font-medium">Select Customer</label>
            <select formControlName="customerId" class="w-full h-10 border rounded px-3">
                <option value="">Search customers</option>
            </select>
        </div>

        <!-- New Customer Panel -->
        <div *ngIf="!isExistingCustomer" class="mt-4 space-y-4">
  <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
    <div class="space-y-2">
      <label for="new-customer-name" class="text-sm font-medium">Full Name *</label>
      <input
        id="new-customer-name"
        type="text"
        formControlName="customerName"
        placeholder="Enter customer's full name"
        class="w-full h-10 rounded-md border px-3 py-2 text-sm"
        required
      />
    </div>

    <div class="space-y-2">
      <label for="new-customer-email" class="text-sm font-medium">Email Address *</label>
      <input
        id="new-customer-email"
        type="email"
        formControlName="customerEmail"
        placeholder="customer@example.com"
        class="w-full h-10 rounded-md border px-3 py-2 text-sm"
        required
      />
    </div>
  </div>

  <div class="space-y-2">
    <label for="new-customer-phone" class="text-sm font-medium">Phone Number *</label>
    <input
      id="new-customer-phone"
      type="tel"
      formControlName="customerPhone"
      placeholder="+1 (555) 123-4567"
      class="w-full h-10 rounded-md border px-3 py-2 text-sm"
      required
    />
  </div>
</div>

    </div>

    <!-- Appointment Details -->
    <div class="space-y-4 border-t pt-4">
        <h3 class="text-sm font-medium text-gray-500">Appointment Details</h3>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="space-y-2">
                <label for="appointment-date" class="text-sm font-medium">Date *</label>
                <input type="date" id="appointment-date" formControlName="date" class="w-full h-10 border rounded px-3"
                    [min]="minDate" required>
            </div>

            <div class="space-y-2">
                <label for="appointment-time" class="text-sm font-medium">Time *</label>
                <input type="time" id="appointment-time" formControlName="time" class="w-full h-10 border rounded px-3"
                    required>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="space-y-2">
                <label for="duration" class="text-sm font-medium">Duration (minutes)</label>
                <select id="duration" formControlName="duration" class="w-full h-10 border rounded px-3">
                    <option [value]="30"> 30 minutes</option>
                    <option [value]="60"> 60 minutes</option>
                    <option [value]="90"> 90 minutes</option>
                </select>
            </div>
        </div>

        <div class="space-y-2">
            <label for="notes" class="text-sm font-medium">Notes (Optional)</label>
            <textarea id="notes" formControlName="notes" rows="3" class="w-full border rounded px-3 py-2"
                placeholder="Add any additional notes"></textarea>
        </div>
    </div>

    <!-- Submit Button -->
    <div class="flex justify-end">
        <button type="submit"
            class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-md flex items-center gap-2">
            <svg class="h-4 w-4"></svg>
            Create Appointment
        </button>
    </div>
</form>
