<div class="rounded-lg border bg-card text-card-foreground shadow-sm lg:col-span-3">
  <div class="space-y-1.5 p-6 flex flex-row items-center justify-between pb-2">
    <div>
      <h3 class="text-2xl font-semibold leading-none tracking-tight">Recent Activity</h3>
      <p class="text-sm text-muted-foreground">Latest updates from your practice</p>
    </div>
    <button class="inline-flex items-center justify-center gap-2 text-sm font-medium h-9 rounded-md px-3 text-emerald-600 hover:bg-accent hover:text-accent-foreground">
      View all
    </button>
  </div>

  <div class="p-6 pt-0">
    <div class="space-y-4">

      <div
        *ngFor="let activity of activities"
        class="flex items-start gap-3 pb-3 border-b last:border-0 last:pb-0"
      >
        <div
          class="mt-0.5 p-1.5 rounded-full"
          [ngClass]="getIconBgColor(activity.type)"
        >
          <svg
            *ngIf="getIcon(activity.type) as icon"
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="h-4 w-4"
            [ngClass]="getIconColor(activity.type)"
            [innerHTML]="icon"
          ></svg>
        </div>
        <div class="flex-1">
          <p class="text-sm">{{ activity.description }}</p>
          <p class="text-xs text-muted-foreground">{{ activity.createdAt}}</p>
        </div>
      </div>

    </div>
  </div>
</div>
